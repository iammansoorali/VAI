# ============================================================
# LLM-GOAT — Vulnerable-by-Design AI Security Lab
# Single command: docker compose up
# ============================================================

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
  llm-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  ollama-models:

services:

  # ── Nginx Reverse Proxy ─────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: llmgoat-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - frontend-net
      - backend-net
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /var/cache/nginx
      - /var/run

  # ── Frontend — React / Vite ─────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: llmgoat-frontend
    networks:
      - frontend-net
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp

  # ── Backend — FastAPI ───────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: llmgoat-backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://llmgoat:llmgoat_dev@postgres:5432/llmgoat
      - REDIS_URL=redis://:redisdev123@redis:6379/0
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2:1b
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production-32chars!!}
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - ENVIRONMENT=development
      - RATE_LIMIT_PER_MINUTE=30
    networks:
      - backend-net
      - llm-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  # ── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: llmgoat-postgres
    environment:
      - POSTGRES_DB=llmgoat
      - POSTGRES_USER=llmgoat
      - POSTGRES_PASSWORD=llmgoat_dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llmgoat"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # ── Redis — Agent Memory Store ──────────────────────────
  redis:
    image: redis:7-alpine
    container_name: llmgoat-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass redisdev123
    volumes:
      - redis-data:/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redisdev123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # ── Ollama — Local LLM Runtime ──────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: llmgoat-ollama
    environment:
      - OLLAMA_KEEP_ALIVE=-1
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - llm-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.5"
          memory: 8G

  # ── Model Puller — downloads model on first run ─────────
  ollama-init:
    image: ollama/ollama:latest
    container_name: llmgoat-ollama-init
    networks:
      - llm-net
    depends_on:
      - ollama
    entrypoint: >
      sh -c "sleep 5 &&
             ollama pull llama3.2:1b &&
             echo 'Model pulled, warming up...' &&
             ollama run llama3.2:1b 'hello' &&
             echo 'Model ready and warmed up'"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: "no"
